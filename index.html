<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Yaldevi&family=Zen+Maru+Gothic&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Pokédex</title>
  </head>
  <body>
    <nav class="navbar" id="header-navbar">
      <div class="container">
        <div class="d-flex align-items-center gap-2">
          <img src="img/navbar-icon.png" alt="Pokeball Logo" width="38" height="38" />
          <h2 class="m-0">Pokédex</h2>
        </div>

        <form id="search-form" autocomplete="off">
          <div class="d-flex gap-2">
            <input
              class="form-control"
              id="search-bar"
              type="search"
              placeholder="Search"
              aria-label="Search"
              required
            />

            <button class="btn btn-outline-light px-2" id="search-btn" type="submit">
              <span>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="22"
                  height="22"
                  fill="currentColor"
                  class="bi bi-search"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"
                  />
                </svg>
              </span>
              <span class="visually-hidden">Search</span>
            </button>
          </div>

          <div class="visually-hidden" id="autocomplete-list"></div>
        </form>
      </div>
    </nav>

    <main>
      <div class="container">
        <div class="row px-3 py-2" id="card-container"></div>

        <div class="row px-3 visually-hidden" id="error-card-container">
          <div class="col-12">
            <div class="p-2 error-card">
              <h4 class="m-1 p-1">No Pokémon matches your search!</h4>
              <p class="m-1 p-1">
                Try using the <strong>autocomplete suggestions</strong> if you don't remember the
                Pokémon name.
              </p>
            </div>
          </div>
        </div>

        <div class="row py-4">
          <nav aria-label="pokemon-pages" class="d-flex justify-content-center">
            <ul class="pagination rounded">
              <li class="page-item">
                <button class="page-link" aria-label="Previous" id="prev-page">
                  <span aria-hidden="true">&laquo;</span>
                </button>
              </li>

              <li class="page-item" id="page-info">
                <button class="page-link">
                  <span id="current-page">1</span>
                  <span>of</span>
                  <span id="last-page"></span>
                </button>
              </li>

              <li class="page-item">
                <button class="page-link" aria-label="Next" id="next-page">
                  <span aria-hidden="true">&raquo;</span>
                </button>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </main>

    <script src="src/index.js"></script>
    <script src="src/search.js"></script>
    <script src="src/search_autocomplete.js"></script>
    <script src="src/pagination.js"></script>
    <script src="src/pokedex_setup.js"></script>
  </body>
</html>
